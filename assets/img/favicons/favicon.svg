<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 그라데이션 정의 -->
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#fdf4ff" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="arm1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="arm2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- 중심부 빛 번짐 -->
  <circle cx="50" cy="50" r="25" fill="url(#coreGlow)" />
  
  <!-- 중심 별 -->
  <circle cx="50" cy="50" r="6" fill="#ffffff" />

  <!-- 은하 나선 팔 1 (우측 하단으로 뻗는 형태) -->
  <path d="M 50 44 C 65 44 80 50 85 65 C 88 74 85 85 75 90" fill="none" stroke="url(#arm1)" stroke-width="5" stroke-linecap="round" />
  <path d="M 50 40 C 72 40 90 55 92 75" fill="none" stroke="url(#arm1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- 은하 나선 팔 2 (좌측 상단으로 뻗는 형태) -->
  <path d="M 50 56 C 35 56 20 50 15 35 C 12 26 15 15 25 10" fill="none" stroke="url(#arm2)" stroke-width="5" stroke-linecap="round" />
  <path d="M 50 60 C 28 60 10 45 8 25" fill="none" stroke="url(#arm2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- 주변의 작은 별들 -->
  <circle cx="25" cy="25" r="1.5" fill="#ffffff" />
  <circle cx="75" cy="75" r="1.5" fill="#ffffff" />
  <circle cx="80" cy="30" r="2" fill="#fdf4ff" />
  <circle cx="20" cy="70" r="2" fill="#fdf4ff" />
  <circle cx="35" cy="85" r="1" fill="#ffffff" opacity="0.8" />
  <circle cx="65" cy="15" r="1" fill="#ffffff" opacity="0.8" />
  <circle cx="10" cy="50" r="1" fill="#ffffff" />
  <circle cx="90" cy="50" r="1" fill="#ffffff" />
</svg>
